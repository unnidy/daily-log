<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 下面这行让手机浏览器按手机宽度显示,不然会缩成一小块 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Xin's Daily Log · 每日打卡</title>
<!-- 下面几行是"假装成手机App"的关键:添加到主屏幕后全屏显示、有自己的图标 -->
<meta name="theme-color" content="#6c7cf5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="打卡">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<style>
/* ============ 整体样式 ============ */
/* :root 里定义"颜色变量",后面写 var(--xx) 就是引用这里的颜色,改一处全局生效 */
:root {
  --bg: #f6f7fb;
  --card: #ffffff;
  --text: #2b2d36;
  --text-light: #9a9db0;
  --primary: #6c7cf5;
  --line: #ececf2;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  /* 给底部导航栏留出空间 */
  padding-bottom: 76px;
}
/* 内容区:手机上占满,电脑上居中、最宽 520px,看起来像手机 App */
.container { max-width: 520px; margin: 0 auto; padding: 0 16px; }

/* 顶部标题区 */
header {
  background: linear-gradient(135deg, #6c7cf5, #9b6cf5);
  color: #fff;
  /* env(safe-area-inset-top) = iPhone 刘海/状态栏的高度,全屏App模式下自动留空 */
  padding: calc(22px + env(safe-area-inset-top)) 0 18px;
  margin-bottom: 16px;
}
header h1 { font-size: 20px; font-weight: 700; }
header .date { font-size: 13px; opacity: .85; margin-top: 4px; }

/* ============ 今天页:习惯卡片 ============ */
.habit-card {
  background: var(--card);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
  cursor: pointer;
  transition: transform .1s;
}
.habit-card:active { transform: scale(.98); }
.habit-emoji {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.habit-info { flex: 1; min-width: 0; }
.habit-name { font-size: 16px; font-weight: 600; }
.habit-streak { font-size: 12px; color: var(--text-light); margin-top: 2px; }
/* 打卡按钮:圆圈,打完变成实心勾 */
.check-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 2.5px solid var(--line);
  background: none;
  font-size: 17px;
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
  transition: all .15s;
}
.check-btn.done { border-color: transparent; }
/* 编辑模式下出现的删除按钮 */
.del-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: none;
  background: #ffe3e3;
  color: #e05656;
  font-size: 15px;
  cursor: pointer;
  flex-shrink: 0;
}
.today-summary {
  text-align: center;
  font-size: 13px;
  color: var(--text-light);
  margin: 14px 0 8px;
}
.row-btns { display: flex; gap: 10px; margin-top: 14px; }
.big-btn {
  flex: 1;
  padding: 13px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.big-btn.primary { background: var(--primary); color: #fff; }
.big-btn.ghost { background: #ecedfb; color: var(--primary); }

/* ============ 日历页 ============ */
/* 习惯选择小胶囊,横向可滑动 */
.chips { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 12px; }
.chip {
  padding: 7px 14px;
  border-radius: 99px;
  background: var(--card);
  border: 1.5px solid var(--line);
  font-size: 13px;
  white-space: nowrap;
  cursor: pointer;
}
.chip.active { color: #fff; border-color: transparent; }
.cal-card { background: var(--card); border-radius: 16px; padding: 16px; }
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-head .title { font-weight: 700; font-size: 16px; }
.cal-nav {
  border: none; background: var(--bg);
  width: 32px; height: 32px; border-radius: 10px;
  font-size: 15px; cursor: pointer; color: var(--text);
}
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-week { text-align: center; font-size: 11px; color: var(--text-light); padding: 6px 0; }
.cal-day {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  font-size: 13px;
  cursor: pointer;
  border: none; background: none; color: var(--text);
}
.cal-day.checked { color: #fff; font-weight: 600; }
.cal-day.today-ring { box-shadow: inset 0 0 0 2px var(--primary); }
.cal-day.future { color: #d4d6e0; cursor: default; }
.cal-tip { text-align: center; font-size: 12px; color: var(--text-light); margin-top: 12px; }
.cal-stat-line { display: flex; justify-content: space-around; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
.cal-stat-line .num { font-size: 20px; font-weight: 700; text-align: center; }
.cal-stat-line .lbl { font-size: 11px; color: var(--text-light); text-align: center; margin-top: 2px; }

/* ============ 统计页 ============ */
.stat-card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.stat-card h3 { font-size: 14px; margin-bottom: 12px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
.bar-label { width: 86px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 14px; background: var(--bg); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width .4s; }
.bar-pct { width: 40px; text-align: right; color: var(--text-light); font-size: 12px; flex-shrink: 0; }
/* 最近7天小圆点矩阵 */
.dots-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.dots-table td, .dots-table th { text-align: center; padding: 5px 2px; font-weight: normal; }
.dots-table .hname { text-align: left; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dot { width: 14px; height: 14px; border-radius: 50%; background: var(--bg); display: inline-block; }

/* ============ 底部导航栏 ============ */
nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--line);
  display: flex;
  padding: 6px 0 calc(6px + env(safe-area-inset-bottom)); /* 给 iPhone 底部小横条留空间 */
}
nav button {
  flex: 1;
  border: none; background: none;
  font-size: 11px;
  color: var(--text-light);
  cursor: pointer;
  padding: 4px 0;
}
nav button .ico { display: block; font-size: 20px; margin-bottom: 2px; }
nav button.active { color: var(--primary); font-weight: 600; }

/* ============ 添加习惯的弹窗 ============ */
.modal-mask {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.4);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 10;
}
.modal-mask.show { display: flex; }
.modal {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 520px;
}
.modal h3 { font-size: 17px; margin-bottom: 14px; }
.modal input[type=text] {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--line);
  border-radius: 12px;
  font-size: 15px;
  margin-bottom: 14px;
  outline-color: var(--primary);
}
.picker { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.picker .opt {
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 2px solid transparent;
  background: var(--bg);
  font-size: 19px;
  cursor: pointer;
}
.picker .opt.sel { border-color: var(--primary); }
.picker .copt { border-radius: 50%; }
.modal-label { font-size: 12px; color: var(--text-light); margin-bottom: 6px; }

.empty-tip { text-align: center; color: var(--text-light); font-size: 14px; padding: 50px 0 30px; line-height: 1.8; }
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>🌱 Xin's Daily Log</h1>
    <div class="date" id="header-date"></div>
  </div>
</header>

<!-- ============ 第1页:今天 ============ -->
<div class="container page" id="page-today">
  <div id="habit-list"></div>
  <div class="empty-tip hidden" id="empty-tip">还没有打卡项目<br>点下面的按钮添加第一个吧 👇</div>
  <div class="today-summary" id="today-summary"></div>
  <div class="row-btns">
    <button class="big-btn primary" onclick="openModal()">＋ 添加习惯</button>
    <button class="big-btn ghost" id="edit-btn" onclick="toggleEdit()">管理</button>
  </div>
</div>

<!-- ============ 第2页:日历(也是补卡的地方) ============ -->
<div class="container page hidden" id="page-cal">
  <div class="chips" id="cal-chips"></div>
  <div class="cal-card">
    <div class="cal-head">
      <button class="cal-nav" onclick="moveMonth(-1)">‹</button>
      <span class="title" id="cal-title"></span>
      <button class="cal-nav" onclick="moveMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-stat-line" id="cal-stats"></div>
  </div>
  <div class="cal-tip">点任意一天可以补卡 / 取消打卡(未来的日子不行哦)</div>
</div>

<!-- ============ 第3页:统计 ============ -->
<div class="container page hidden" id="page-stats">
  <div class="stat-card">
    <h3>📊 最近 30 天完成率</h3>
    <div id="stats-bars"></div>
  </div>
  <div class="stat-card">
    <h3>🗓️ 最近 7 天一览</h3>
    <table class="dots-table" id="dots-table"></table>
  </div>
  <div class="stat-card">
    <h3>💾 数据备份</h3>
    <p style="font-size:12px;color:var(--text-light);margin-bottom:12px;line-height:1.6">
      打卡记录存在这台设备的浏览器里。建议偶尔导出一份备份文件存到 OneDrive;换设备时用"恢复"导入即可。
    </p>
    <div class="row-btns" style="margin-top:0">
      <button class="big-btn ghost" onclick="exportData()">导出备份</button>
      <button class="big-btn ghost" onclick="document.getElementById('import-file').click()">恢复数据</button>
      <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
    </div>
  </div>
</div>

<!-- 底部导航 -->
<nav>
  <button id="tab-today" class="active" onclick="switchPage('today')"><span class="ico">✅</span>今天</button>
  <button id="tab-cal" onclick="switchPage('cal')"><span class="ico">📅</span>日历</button>
  <button id="tab-stats" onclick="switchPage('stats')"><span class="ico">📈</span>统计</button>
</nav>

<!-- 添加习惯的弹窗 -->
<div class="modal-mask" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>添加新习惯</h3>
    <input type="text" id="new-name" placeholder="习惯名称,比如:喝够8杯水" maxlength="12">
    <div class="modal-label">选个图标</div>
    <div class="picker" id="emoji-picker"></div>
    <div class="modal-label">选个颜色</div>
    <div class="picker" id="color-picker"></div>
    <div class="row-btns" style="margin-top:4px">
      <button class="big-btn ghost" onclick="closeModal()">取消</button>
      <button class="big-btn primary" onclick="addHabit()">保存</button>
    </div>
  </div>
</div>

<script>
/* ================================================================
   数据部分
   所有数据是一个对象:{ habits: [习惯列表], checks: {习惯id: [打卡日期]} }
   存在浏览器的 localStorage(本地小仓库)里,key 叫 xin-daily-log
================================================================ */
const STORE_KEY = 'xin-daily-log';

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);   // 字符串 → 还原成对象
  } catch (e) { /* 数据坏了就从空开始 */ }
  return { habits: [], checks: {} };
}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state)); // 对象 → 转成字符串存起来
}

/* ============ 日期小工具 ============ */
// 把日期对象变成 "2026-06-12" 这种文字,方便存储和比较
function fmt(d) {
  const p = n => String(n).padStart(2, '0'); // 个位数前面补0,比如 6 → "06"
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
}
function todayStr() { return fmt(new Date()); }

/* ============ 打卡核心逻辑 ============ */
function isChecked(habitId, dateStr) {
  return (state.checks[habitId] || []).includes(dateStr);
}

// 打卡 / 取消打卡(同一个函数,点一下打,再点取消)
function toggleCheck(habitId, dateStr) {
  if (!state.checks[habitId]) state.checks[habitId] = [];
  const arr = state.checks[habitId];
  const i = arr.indexOf(dateStr);
  if (i >= 0) arr.splice(i, 1);  // 已打过 → 删掉(取消)
  else arr.push(dateStr);        // 没打过 → 加上
  save();
  renderAll();
}

// 当前连续天数:从今天往前数,连续打卡了几天(今天还没打就从昨天数起)
function curStreak(habitId) {
  const set = new Set(state.checks[habitId] || []);
  let d = new Date();
  if (!set.has(fmt(d))) d.setDate(d.getDate() - 1);
  let n = 0;
  while (set.has(fmt(d))) { n++; d.setDate(d.getDate() - 1); }
  return n;
}

// 历史最长连续天数
function bestStreak(habitId) {
  const dates = (state.checks[habitId] || []).slice().sort();
  let best = 0, cur = 0, prev = null;
  for (const ds of dates) {
    if (prev) {
      const gap = (new Date(ds) - new Date(prev)) / 86400000; // 相差几天(86400000毫秒=1天)
      cur = (gap === 1) ? cur + 1 : 1;
    } else cur = 1;
    best = Math.max(best, cur);
    prev = ds;
  }
  return best;
}

/* ================================================================
   界面部分
================================================================ */
let editMode = false;                 // 是否处于"管理"(可删除)模式
let calMonth = new Date();            // 日历当前显示的月份
let calHabitId = null;                // 日历当前看哪个习惯

const WEEKDAYS = ['一','二','三','四','五','六','日'];

function renderAll() {
  renderToday();
  renderCalendar();
  renderStats();
}

/* ---------- 今天页 ---------- */
function renderToday() {
  const today = todayStr();
  const d = new Date();
  document.getElementById('header-date').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · 星期${WEEKDAYS[(d.getDay()+6)%7]}`;

  const list = document.getElementById('habit-list');
  list.innerHTML = '';
  document.getElementById('empty-tip').classList.toggle('hidden', state.habits.length > 0);

  let doneCount = 0;
  for (const h of state.habits) {
    const done = isChecked(h.id, today);
    if (done) doneCount++;
    const streak = curStreak(h.id);

    const card = document.createElement('div');
    card.className = 'habit-card';
    card.innerHTML = `
      <div class="habit-emoji" style="background:${h.color}22">${h.emoji}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-streak">${streak > 0 ? '🔥 已连续 ' + streak + ' 天' : '今天开始新纪录吧'}</div>
      </div>
      ${editMode
        ? `<button class="del-btn" onclick="event.stopPropagation();delHabit('${h.id}')">✕</button>`
        : `<button class="check-btn ${done ? 'done' : ''}" style="${done ? 'background:' + h.color : ''}">${done ? '✓' : ''}</button>`}
    `;
    // 点整张卡片就等于打卡(编辑模式下不打卡)
    card.onclick = () => { if (!editMode) toggleCheck(h.id, today); };
    list.appendChild(card);
  }

  document.getElementById('today-summary').textContent =
    state.habits.length ? `今日进度:${doneCount} / ${state.habits.length}` : '';
  document.getElementById('edit-btn').textContent = editMode ? '完成' : '管理';
}

function toggleEdit() { editMode = !editMode; renderToday(); }

function delHabit(id) {
  const h = state.habits.find(x => x.id === id);
  if (!confirm(`确定删除「${h.name}」吗?它的打卡记录也会一起删除。`)) return;
  state.habits = state.habits.filter(x => x.id !== id);
  delete state.checks[id];
  if (calHabitId === id) calHabitId = null;
  save();
  renderAll();
}

/* ---------- 日历页 ---------- */
function renderCalendar() {
  const chips = document.getElementById('cal-chips');
  chips.innerHTML = '';
  if (state.habits.length === 0) {
    document.getElementById('cal-grid').innerHTML = '';
    document.getElementById('cal-title').textContent = '先去添加一个习惯吧';
    document.getElementById('cal-stats').innerHTML = '';
    return;
  }
  // 默认选中第一个习惯
  if (!calHabitId || !state.habits.find(h => h.id === calHabitId)) calHabitId = state.habits[0].id;

  for (const h of state.habits) {
    const c = document.createElement('button');
    c.className = 'chip' + (h.id === calHabitId ? ' active' : '');
    if (h.id === calHabitId) c.style.background = h.color;
    c.textContent = h.emoji + ' ' + h.name;
    c.onclick = () => { calHabitId = h.id; renderCalendar(); };
    chips.appendChild(c);
  }

  const habit = state.habits.find(h => h.id === calHabitId);
  const y = calMonth.getFullYear(), m = calMonth.getMonth();
  document.getElementById('cal-title').textContent = `${y}年${m + 1}月`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = WEEKDAYS.map(w => `<div class="cal-week">${w}</div>`).join('');

  // 这个月1号是星期几,前面要空几格(我们的日历从周一开始)
  const offset = (new Date(y, m, 1).getDay() + 6) % 7;
  for (let i = 0; i < offset; i++) grid.appendChild(document.createElement('div'));

  const daysInMonth = new Date(y, m + 1, 0).getDate(); // 这个月有几天
  const today = todayStr();
  let monthChecked = 0;

  for (let day = 1; day <= daysInMonth; day++) {
    const ds = fmt(new Date(y, m, day));
    const checked = isChecked(calHabitId, ds);
    if (checked) monthChecked++;
    const isFuture = ds > today;

    const btn = document.createElement('button');
    btn.className = 'cal-day'
      + (checked ? ' checked' : '')
      + (ds === today ? ' today-ring' : '')
      + (isFuture ? ' future' : '');
    if (checked) btn.style.background = habit.color;
    btn.textContent = day;
    // 点过去的日子 = 补卡 / 取消;未来不可点
    if (!isFuture) btn.onclick = () => toggleCheck(calHabitId, ds);
    grid.appendChild(btn);
  }

  document.getElementById('cal-stats').innerHTML = `
    <div><div class="num" style="color:${habit.color}">${monthChecked}</div><div class="lbl">本月打卡</div></div>
    <div><div class="num" style="color:${habit.color}">${curStreak(calHabitId)}</div><div class="lbl">当前连续</div></div>
    <div><div class="num" style="color:${habit.color}">${bestStreak(calHabitId)}</div><div class="lbl">最长纪录</div></div>
  `;
}

function moveMonth(delta) {
  calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + delta, 1);
  renderCalendar();
}

/* ---------- 统计页 ---------- */
function renderStats() {
  // 最近30天每个习惯的完成率,画成横条
  const bars = document.getElementById('stats-bars');
  if (state.habits.length === 0) {
    bars.innerHTML = '<div style="font-size:13px;color:var(--text-light)">暂无数据</div>';
    document.getElementById('dots-table').innerHTML = '';
    return;
  }
  const last30 = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    last30.push(fmt(d));
  }
  bars.innerHTML = state.habits.map(h => {
    const n = last30.filter(ds => isChecked(h.id, ds)).length;
    const pct = Math.round(n / 30 * 100);
    return `<div class="bar-row">
      <div class="bar-label">${h.emoji} ${h.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${h.color}"></div></div>
      <div class="bar-pct">${pct}%</div>
    </div>`;
  }).join('');

  // 最近7天:习惯 × 日期 的小圆点表格
  const last7 = last30.slice(-7);
  const table = document.getElementById('dots-table');
  table.innerHTML =
    '<tr><th></th>' + last7.map(ds => {
      const d = new Date(ds);
      return `<th>${ds === todayStr() ? '今' : d.getDate()}</th>`;
    }).join('') + '</tr>'
    + state.habits.map(h =>
      '<tr><td class="hname">' + h.emoji + ' ' + h.name + '</td>'
      + last7.map(ds =>
          `<td><span class="dot" style="${isChecked(h.id, ds) ? 'background:' + h.color : ''}"></span></td>`
        ).join('')
      + '</tr>'
    ).join('');
}

/* ---------- 页面切换 ---------- */
function switchPage(name) {
  for (const p of ['today', 'cal', 'stats']) {
    document.getElementById('page-' + p).classList.toggle('hidden', p !== name);
    document.getElementById('tab-' + p).classList.toggle('active', p === name);
  }
}

/* ---------- 添加习惯弹窗 ---------- */
const EMOJIS = ['💧','📖','🏃','🧘','💪','🛌','🍎','📝','🎹','🧹','🌞','🚫','💊','🪥','🐶','💰'];
const COLORS = ['#6c7cf5','#f56c8b','#f5a76c','#53c283','#4FC3F7','#b06cf5','#f5d36c','#7d8a99'];
let selEmoji = EMOJIS[0], selColor = COLORS[0];

function buildPickers() {
  const ep = document.getElementById('emoji-picker');
  ep.innerHTML = '';
  for (const e of EMOJIS) {
    const b = document.createElement('button');
    b.className = 'opt' + (e === selEmoji ? ' sel' : '');
    b.textContent = e;
    b.onclick = () => { selEmoji = e; buildPickers(); };
    ep.appendChild(b);
  }
  const cp = document.getElementById('color-picker');
  cp.innerHTML = '';
  for (const c of COLORS) {
    const b = document.createElement('button');
    b.className = 'opt copt' + (c === selColor ? ' sel' : '');
    b.style.background = c;
    b.onclick = () => { selColor = c; buildPickers(); };
    cp.appendChild(b);
  }
}

function openModal() {
  selEmoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)]; // 随机给个默认图标
  selColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  buildPickers();
  document.getElementById('new-name').value = '';
  document.getElementById('modal').classList.add('show');
  document.getElementById('new-name').focus();
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

function addHabit() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { alert('给习惯起个名字吧'); return; }
  state.habits.push({
    id: 'h' + Date.now(),  // 用当前时间戳当作独一无二的编号
    name, emoji: selEmoji, color: selColor,
    createdAt: todayStr()
  });
  save();
  closeModal();
  renderAll();
}

/* ---------- 备份与恢复 ---------- */
function exportData() {
  // 把数据变成一个 .json 文件让浏览器下载
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `daily-log-备份-${todayStr()}.json`;
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data.habits) || typeof data.checks !== 'object') throw new Error();
      if (!confirm('恢复备份会覆盖当前的全部记录,确定吗?')) return;
      state = data;
      save();
      renderAll();
      alert('恢复成功!');
    } catch (e) {
      alert('这个文件不是有效的备份文件');
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // 清空,这样下次选同一个文件也能触发
}

/* ---------- 启动 ---------- */
renderAll();
</script>
</body>
